name: Protocol Kit - E2E Tests
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - development
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
        provider: [ethers, viem]
        contract-version: [v1.0.0, v1.1.1, v1.2.0, v1.3.0, v1.4.1, v1.5.0]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn
      - run: |
          yarn install --frozen-lockfile
          yarn build
      - name: Test ${{ matrix.provider }} - Safe ${{ matrix.contract-version }}
        run: |
          cd packages/protocol-kit
          yarn test:hardhat:${{ matrix.provider }}:${{ matrix.contract-version }}
