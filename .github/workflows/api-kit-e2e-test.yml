name: API Kit - E2E Tests
on:
  pull_request:
  push:
    branches:
      - main
      - development

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/development' }}

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        node-version: [20.x]
        provider: [ethers, viem]
        safe-version: [v1.3.0, v1.4.1, v1.5.0]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Test ${{ matrix.provider }} - Safe ${{ matrix.safe-version }}
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          cd packages/api-kit
          pnpm test:ci:${{ matrix.provider }}:${{ matrix.safe-version }}
