packages:
  - 'packages/*'

# Block packages published within the last 7 days.
minimumReleaseAge: 10080 # minutes (7 days)

# Only packages listed here are allowed to run install scripts.
# esbuild and nx require native compilation; keccak and secp256k1 are native
# addons used by hardhat (fall back to pure JS if skipped, but run slower).
onlyBuiltDependencies:
  - esbuild
  - keccak
  - nx
  - secp256k1

# Prevent sub-dependencies from using exotic specifiers without approval.
blockExoticSubdeps: true
